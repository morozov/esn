name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version string
        required: true
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            artifact: esn-linux-x86_64
            binary: bin/esn
            setup: apt

          - name: Linux aarch64
            runner: ubuntu-24.04-arm
            artifact: esn-linux-aarch64
            binary: bin/esn
            setup: apt

          - name: macOS arm64
            runner: macos-latest
            artifact: esn-macos-arm64
            binary: bin/esn
            setup: brew

          - name: Windows x86_64
            runner: windows-latest
            artifact: esn-windows-x86_64
            binary: bin/esn.exe
            setup: lazarus

    steps:
      - uses: actions/checkout@v6

      - name: Install Free Pascal (apt)
        if: matrix.setup == 'apt'
        run: sudo apt-get update && sudo apt-get install -y fpc

      - name: Install Free Pascal (brew)
        if: matrix.setup == 'brew'
        run: brew install fpc

      - name: Install Free Pascal (Lazarus)
        if: matrix.setup == 'lazarus'
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: stable

      - name: Build (Unix)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        env:
          VERSION: ${{ inputs.version }}
        run: make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: .\build.ps1 -Version "$env:VERSION"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
