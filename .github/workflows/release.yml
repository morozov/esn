name: Release

on:
  push:
    tags: ['*']

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release
          skip-decompress: true
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          files: release/*.zip
